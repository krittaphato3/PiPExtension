<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Main rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>

  <!-- Outer PiP window (larger, representing the main window) -->
  <rect x="20" y="20" width="88" height="88" rx="12" fill="none" stroke="white" stroke-width="4" opacity="0.3"/>

  <!-- Inner PiP window (smaller, floating to bottom-right — the PiP effect) -->
  <rect x="56" y="56" width="52" height="52" rx="10" fill="white" opacity="0.95"/>

  <!-- Play triangle inside the inner PiP window -->
  <polygon points="76,68 76,96 100,82" fill="url(#bg)"/>
</svg>
