<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="icon-placeholder">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            </div>
            <h1>FullPiP</h1>

        <div class="card">
            <div class="setting-row">
                <div class="setting-text">
                    <span class="setting-label">Auto-PiP Mode</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="autoPipCheckbox">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <footer>
            <p>Dev: <span class="accent">krittaphato3</span></p>
        </footer>
    </div>
    <script src="popup.js"></script>

</html>
