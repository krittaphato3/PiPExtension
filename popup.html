<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div class="logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M12 2v20"/><path d="M2 12h20"/></svg>
                </div>
                <h1>FullPiP <span class="badge">PRO</span></h1>
            </div>
            <div class="theme-toggle" id="themeBtn" title="Toggle Dark/Light Mode">
                </div>
        </header>

        <main>
    <!-- Settings -->
    <div class="card">
        <div class="setting-item">
            <div class="meta">
                <span class="label">Auto-PiP Mode</span>
                <span class="desc">Pop video when scrolling away</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="autoPipCheckbox">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- Media List -->
    <h2 class="media-header">Active Media</h2>
    <div id="media-list">
        <!-- Items injected by JS -->
        <div style="text-align: center; color: var(--text-sub); padding: 10px; font-size: 12px;">Scanning...</div>
    </div>

    <!-- Info -->

            <div class="card secondary">
                <div class="info-row">
                    <span>Shortcut</span>
                    <kbd>Alt + P</kbd>
                </div>
            </div>
        </main>

        <footer>
            <div class="status">v2.0.0 • Stable</div>
            <a href="https://github.com/krittaphato3" target="_blank" class="author">krittaphato3</a>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
